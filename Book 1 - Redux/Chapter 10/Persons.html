<!doctype html>

<html>
  <head>
    <title>List of Persons</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/redux/4.2.1/redux.min.js"></script>
  </head>

  <body>
    <script>
      // ===================================
      // Creating action objects
      // ===================================

      function addPerson(id, name, age) {
        return {
          type: "ADD",
          personData: {
            id: id,
            name: name,
            age: age,
          },
        };
      }

      function removePerson(id) {
        return {
          type: "REMOVE",
          personId: id,
        };
      }

      // ===================================
      // Define Reducer Function
      // ===================================

      const initialState = {
        persons: [],
      };

      function reducer(state, action) {
        if (state === undefined) {
          // all this Undefined is doing is making sure our reducer has a state to work in. It would be an empty person array
          state = initialState;
        }
        if (action.type === "ADD") {
          const newPerson = {
            id: action.personData.id,
            name: action.personData.name,
            age: action.personData.age,
          };
          return {
            ...state,
            persons: state.persons.concat(newPerson),
          };
        } else if (action.type === "REMOVE") {
          return {
            ...state,
            persons: state.persons.filter(
              (person) => person.id !== action.personId,
            ),
          };
        } else {
          return state;
        }
      }

      const store = Redux.createStore(reducer);
      store.subscribe(showState); // every time there are changes made to the store, please excecute the function

      function showState() {
        console.log(store.getState());
      }

      store.dispatch(addPerson(1, "Greg", 5)); // we call the dispatch with store, that will run the addPerson function using the 3 arguments, ID, name and age. 
      // so the reducer will receive the info for this function. So it will grab the passed in data and update the info, because in this case the action type is ADD. Add the person and return the new state with the persons info concatenated
      store.dispatch(addPerson(2, "Carol", 3));
      store.dispatch(addPerson(3, "Gabriel", 6));
      store.dispatch(addPerson(4, "Fred", 8));
      store.dispatch(removePerson(4));


    </script>
  </body>
</html>
